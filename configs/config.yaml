chunking:
  chunk_size: 900
  overlap: 150

retrieval:
  top_k: 10
  rerank: true
  expand_query: true
  filters: {}

verification:
  support_threshold: 0.75
  max_retries: 2

models:
  groq_chat_model: "mixtral-8x7b-32768"
  groq_embedding_model: "mixtral-8x7b-32768"  # Assuming same for now, but embeddings might be different
  nli_model: "roberta-large-mnli"
